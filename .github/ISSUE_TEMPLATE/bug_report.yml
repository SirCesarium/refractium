name: Bug Report
about: Create a report to help us improve Refractium
title: "[BUG] <title>"
labels: bug
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please provide as much information as possible to help us reproduce the issue.
  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the bug in detail.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Start Refractium with config...
        2. Send traffic using...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: [e.g. Linux]
        - Version: [e.g. 3.0.0]
        - Rust Version: [e.g. 1.94.1]
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      placeholder: Paste any relevant logs here.
    validations:
      required: false
