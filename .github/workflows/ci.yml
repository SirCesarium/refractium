name: CI
on: [push, pull_request]
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Lint
        run: cargo clippy --all-features -- -D warnings
      - name: Check
        run: cargo check --all-features
      - name: Test
        run: cargo test --all-features
