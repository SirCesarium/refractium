[package]
name = "t-port"
version = "0.1.0"
edition = "2024"
authors = ["SirCesarium"]
description = "A lightweight L4 protocol multiplexer with zero-copy routing."
license = "MIT"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
tokio = { version = "1.0", features = ["full"] }

[[bin]]
name = "tp"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"